name = xPlorer
summary = "xPlorer"
description = """Elevate your File Explorer experience with advanced automation and seamless navigation tools
Hot Keys:
NVDA+Shift+X : Open xPlorer Context Menu
NVDA+Shift+z
Single Tap : Say Size
 Double Tap : Compress Zip
NVDA+Shift+C
Single Tap : Copy Selected File and Folder Names
 Double Tap : Copy Address Bar Current Folder
NVDA+Shift+R
Single Tap : Robo Copy
Double Tap : Robo Paste
Tripple Tap : Robo Remove
NVDA+Shift+V
Single Tap : Copy Content
 Double Tap : Invert Selection
NVDA+Shift+F2 : Rename File Only"""
author = "Chai Chaimee <chaicm75@gmail.com>"
url = https://github.com/chaichaimee/xPlorer
version = 2026.7.8
changelog = """Fixed robocopy UI hangs, USB compatibility, silent file loss, and Explorer path cache mismatches via non-blocking stdout, drive-type tuning, and HWND-validated caching."""
