summary = "xPlorer"
description = """고급 자동화 및 원활한 탐색 도구를 통해 파일 탐색기 경험을 향상시키십시오.
단축키:
NVDA+Shift+X : xPlorer 컨텍스트 메뉴 열기
NVDA+Shift+z
한 번 누르기 : 크기 말하기
두 번 누르기 : Zip으로 압축
NVDA+Shift+C
한 번 누르기 : 선택한 파일 및 폴더 이름 복사
두 번 누르기 : 주소 표시줄에서 현재 폴더 경로 복사
NVDA+Shift+R
한 번 누르기 : Robo Copy
두 번 누르기 : Robo Paste
세 번 누르기 : Robo Remove
NVDA+Shift+V
한 번 누르기 : 내용 복사
두 번 누르기 : 선택 반전
NVDA+Shift+F2 : 파일 이름만 바꾸기"""