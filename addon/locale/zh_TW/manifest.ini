summary = "xPlorer"
description = """透過先進的自動化和無縫導航工具提升您的檔案總管體驗。
快速鍵：
NVDA+Shift+X : 打開 xPlorer 快顯功能表
NVDA+Shift+z
單擊 : 朗讀大小
雙擊 : 壓縮為 Zip
NVDA+Shift+C
單擊 : 複製選取的檔案和資料夾名稱
雙擊 : 從網址列複製目前資料夾路徑
NVDA+Shift+R
單擊 : Robo Copy (複製)
雙擊 : Robo Paste (貼上)
三擊 : Robo Remove (移除)
NVDA+Shift+V
單擊 : 複製內容
雙擊 : 反向選取
NVDA+Shift+F2 : 僅重新命名檔案"""