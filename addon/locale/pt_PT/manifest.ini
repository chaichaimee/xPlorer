summary = "xPlorer"
description = """Eleve a sua experiência no Explorador de Ficheiros com automação avançada e ferramentas de navegação fluidas.
Teclas de Atalho:
NVDA+Shift+X : Abrir Menu de Contexto do xPlorer
NVDA+Shift+z
Um Toque : Dizer Tamanho
Dois Toques : Comprimir em Zip
NVDA+Shift+C
Um Toque : Copiar Nomes de Ficheiros e Pastas Selecionados
Dois Toques : Copiar Caminho da Pasta Atual da Barra de Endereços
NVDA+Shift+R
Um Toque : Robo Copy
Dois Toques : Robo Paste
Três Toques : Robo Remove
NVDA+Shift+V
Um Toque : Copiar Conteúdo
Dois Toques : Inverter Seleção
NVDA+Shift+F2 : Renomear Apenas o Ficheiro"""