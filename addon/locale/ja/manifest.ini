summary = "xPlorer"
description = """高度な自動化とシームレスなナビゲーションツールで、エクスプローラーの体験を向上させます
ホットキー:
NVDA+Shift+X : xPlorerコンテキストメニューを開く
NVDA+Shift+z
シングルタップ : サイズを読み上げる
 ダブルタップ : Zip圧縮
NVDA+Shift+C
シングルタップ : 選択したファイルとフォルダ名をコピー
 ダブルタップ : 現在のフォルダのアドレスをコピー
NVDA+Shift+V
シングルタップ : 内容をコピー
 ダブルタップ : 選択を反転
NVDA+Shift+F2 : ファイル名のみ変更"""