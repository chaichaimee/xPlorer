summary = "xPlorer"
description = """高度な自動化とシームレスなナビゲーションツールにより、エクスプローラーの操作性を向上させます。
ホットキー:
NVDA+Shift+X : xPlorer コンテキストメニューを開く
NVDA+Shift+z
1回押し : サイズを読み上げ
2回押し : Zip 圧縮
NVDA+Shift+C
1回押し : 選択したファイルとフォルダー名をコピー
2回押し : アドレスバーから現在のフォルダーパスをコピー
NVDA+Shift+R
1回押し : Robo Copy (コピー)
2回押し : Robo Paste (貼り付け)
3回押し : Robo Remove (削除)
NVDA+Shift+V
1回押し : 内容をコピー
2回押し : 選択を反転
NVDA+Shift+F2 : ファイル名のみ変更"""