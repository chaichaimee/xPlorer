summary = "xPlorer"
description = """通过先进 wine 的自动化和无缝导航工具提升您的文件资源管理器体验。
热键：
NVDA+Shift+X : 打开 xPlorer 右键菜单
NVDA+Shift+z
单击 : 朗读大小
双击 : 压缩为 Zip
NVDA+Shift+C
单击 : 复制选中的文件和文件夹名称
双击 : 从地址栏复制当前文件夹路径
NVDA+Shift+R
单击 : Robo Copy (复制)
双击 : Robo Paste (粘贴)
三击 : Robo Remove (移除)
NVDA+Shift+V
单击 : 复制内容
双击 : 反向选择
NVDA+Shift+F2 : 仅重命名文件"""