summary = "xPlorer"
description = """Itaas ang iyong karanasan sa File Explorer gamit ang advanced na automation at mahusay na mga tool sa pag-navigate.
Hot Keys:
NVDA+Shift+X : Buksan ang xPlorer Context Menu
NVDA+Shift+z
Isang Tap : Sabihin ang Laki
Dalawang Tap : I-compress sa Zip
NVDA+Shift+C
Isang Tap : Kopyahin ang mga pangalan ng Piniling File at Folder
Dalawang Tap : Kopyahin ang kasalukuyang Folder mula sa Address Bar
NVDA+Shift+R
Isang Tap : Robo Copy
Dalawang Tap : Robo Paste
Tatlong Tap : Robo Remove
NVDA+Shift+V
Isang Tap : Kopyahin ang Nilalaman
Dalawang Tap : Baligtarin ang Pinili
NVDA+Shift+F2 : Palitan ang pangalan ng File Lamang"""